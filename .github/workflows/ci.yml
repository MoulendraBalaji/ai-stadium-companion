name: Stadium Companion CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Lint with black & ruff
        run: |
          cd backend
          black --check .
          ruff check .

      - name: Run unit tests with pytest
        run: |
          cd backend
          python -m pytest --cov=app --cov-fail-under=75 -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build TypeScript / Vite
        run: |
          cd frontend
          npm run build

      - name: Run Vitest unit tests
        run: |
          cd frontend
          npm test
