<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Apple-style Green Gradient -->
    <linearGradient id="apple-leaf-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#30d158" />
      <stop offset="60%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#0071e3" />
    </linearGradient>
  </defs>
  
  <!-- Outer glowing background ring (subtle Apple HIG detail) -->
  <circle cx="50" cy="50" r="46" fill="none" stroke="#2c2c2e" stroke-width="2" />
  
  <!-- Stylized leaf matching Apple-style minimal icons -->
  <path d="M 50 15 
           C 72 15, 85 38, 80 62 
           C 75 80, 58 88, 50 88 
           C 42 88, 25 80, 20 62 
           C 15 38, 28 15, 50 15 Z" 
        fill="url(#apple-leaf-grad)" />
  
  <!-- Minimal central leaf vein line representing the digital carbon pulse -->
  <path d="M 50 15 C 53 38, 52 65, 50 88" 
        fill="none" 
        stroke="#ffffff" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        opacity="0.85" />
</svg>